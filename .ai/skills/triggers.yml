# Skill Triggers — deterministic matching
#
# Used by main session in Step 4b (implement-issue.md) to match
# issues to skills. Check BOTH files and keywords:
# - files: match if issue affects these paths
# - keywords: match if issue text (title+body) contains at least one keyword
# - specialist: which specialist should run the skill
#
# Matching rule: files-match AND at least one keyword-match → inject skill.
# When in doubt: include anyway (skill is an aid, not a mandate).
#
# TODO: Add skills for your project's recurring patterns.
# Examples below — customize or remove as needed.

